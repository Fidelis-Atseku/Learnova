<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="css/card.css">
    <link rel="stylesheet" href="css/sign-in.css">
    <link rel="stylesheet" href="css/register.css">
    <link rel="stylesheet" href="css/forgot-password.css">
    <link rel="stylesheet" href="css/index.css">
    <script type="module" src="./js/index.js" defer></script>
    <!-- <script src="js/index.js" defer></script> -->
</head>
    <body>
        <main>
            <header class="main-header shadow-box-1">

                <div class="left-section">
                    <button class="ls-hamburger-btn active-box-1">
                        <img src="assets\svg\icons8-hamburger-menu.svg" alt="">
                    </button>
                    <img class="logo-icon" src="assets\images\learnova-icon.png" alt="">
                    <div class="main-content-name logo-text"><img src="assets\images\learnova-text.png" alt=""></div>
                </div>

                <div class="right-section">
                    <button id="calendar-btn" class="rh-btn active-box-1">
                        <img src="assets\images\icons8-calendar-100.png" alt="" class="h-btn-icon">
                    </button>

                    <button id="notifications-btn" class="rh-btn active-box-1">
                        <img src="assets\images\icons8-notification-64.png" alt="" class="h-btn-icon">
                    </button>

                    <button id="help-btn" class="rh-btn active-box-1">
                        <img src="assets\images\icons8-help-100.png" alt="" class="h-btn-icon">
                        <img src="assets\images\icons8-collapse-arrow-100.png" alt="">
                        <div class="role-dropdown"></div>
                    </button>

                    <button id="role-btn" class="rh-btn active-box-1">
                        <img src="assets\images\icons8-roles-100 (1).png" alt="" class="h-btn-icon">
                    </button>

                    <button id="profile-btn" class="rh-btn active-box-1">
                        <img src="assets\images\icons8-account-100.png" alt="profile" class="h-btn-icon">
                    </button>
                </div>

            </header>

            <div class="main-content">
                <div class="left sidebar shadow-box-1">
                    <button id="ls-collapse-btn" class="hover-box-2 active-box-1">
                        <img src="assets\images\icons8-collapse-arrow-100.png" alt="" class="ls-collapse-icon">
                    </button>
                    
                    <div class="student-sidebar-content sidebar-content">
                        <button id="ls-home" class="ls-btn hover-box-2 active-box-1">
                            <img src="assets\svg\icons8-home.svg" alt="" class="ls-btn-icon">
                            <span class="ls-btn-text">Home</span>
                        </button>

                        <button id="ls-courses" class="ls-btn hover-box-2 active-box-1">
                            <img src="assets\images\icons8-read-100.png" alt="" class="ls-btn-icon">
                            <span class="ls-btn-text">My Courses</span>
                        </button>
                        <button id="ls-explore" class="ls-btn hover-box-2 active-box-1">
                            <img src="assets\svg\icons8-binoculars.svg" alt="" class="ls-btn-icon">
                            <span class="ls-btn-text">Explore Courses</span>
                        </button>

                        <button id="ls-institution" class="ls-btn hover-box-2 active-box-1">
                            <img src="assets\images\icons8-institution-100.png" alt="" class="ls-btn-icon">
                            <span class="ls-btn-text">Institutions</span>
                        </button>

                        <button id="ls-discussion" class="ls-btn hover-box-2 active-box-1">
                            <img src="assets\images\icons8-discussion-100.png" alt="" class="ls-btn-icon">
                            <span class="ls-btn-text">Discussions</span>
                        </button>

                        <button id="ls-assignment" class="ls-btn hover-box-2 active-box-1">
                            <img src="assets\images\icons8-assignment-100.png" alt="" class="ls-btn-icon">
                            <span class="ls-btn-text">Assignments</span>
                        </button>

                        <button id="ls-settings" class="ls-btn hover-box-2 active-box-1">
                            <img src="assets\svg\icons8-settings.svg" alt="" class="ls-btn-icon">
                            <span class="ls-btn-text">Settings</span>
                        </button>
                    </div>

                    <div class="instructor-sidebar-content sidebar-content">

                    </div>

                    <div class="admin-sidebar-content sidebar-content">

                    </div>

                </div>

                <div class="index content shadow-box-1"></div>

                <div class="right sidebar chatbot shadow-box-1 collapsed">
                    <button id="rs-collapse-btn">
                        <img src="assets\images\learnova-ai-1.png" alt="" id="rs-collapse-icon">
                    </button>
                    <div class="input-box">
                        <div class="prompt-text-area">
                            <p contenteditable="true" id="prompt-p"></p>
                        </div>
                        <div class="features">
                            <div class="left-section">
                                <button class="prompt-attach-btn">Attach</button>
                                <button class="prompt-search-btn">Search</button>
                                <button class="prompt-context-btn">Context</button>
                            </div>
                            <div class="right-section">
                                <button class="prompt-send-btn">
                                    <img src="assets\images\icons8-send-letter-100.png" alt="">
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="login-content"></div>

            <footer class="main-footer shadow-box-1">

            </footer>
        </main>
    </body>
</html>
