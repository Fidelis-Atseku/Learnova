<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="css/card.css">
    <link rel="stylesheet" href="css/sign-in.css">
    <link rel="stylesheet" href="css/register.css">
    <link rel="stylesheet" href="css/forgot-password.css">
    <link rel="stylesheet" href="css/index.css">
    <script type="module" src="./js/index.js" defer></script>
    <!-- <script src="js/index.js" defer></script> -->
</head>
    <body>
        <main>
            <header class="main-header shadow-box-1">

                <div class="left-section">
                    <button class="ls-hamburger-btn active-box-1">
                        <img src="assets\svg\icons8-hamburger-menu.svg" alt="">
                    </button>
                    <img class="logo-icon" src="assets\images\learnova-icon.png" alt="">
                    <div class="main-content-name logo-text"><img src="assets\images\learnova-text.png" alt=""></div>
                </div>

                <div class="right-section">
                    <button id="calendar-btn" class="rh-btn active-box-1">
                        <img src="assets\images\icons8-calendar-100.png" alt="" class="h-btn-icon">
                    </button>

                    <button id="notifications-btn" class="rh-btn active-box-1">
                        <img src="assets\images\icons8-notification-64.png" alt="" class="h-btn-icon">
                    </button>

                    <button id="help-btn" class="rh-btn active-box-1">
                        <img src="assets\images\icons8-help-100.png" alt="" class="h-btn-icon">
                    </button>

                    <button id="role-btn" class="rh-btn active-box-1">
                        <img src="assets\images\icons8-roles-100 (1).png" alt="" class="h-btn-icon role-btn-icon">
                        <img src="assets\images\icons8-collapse-arrow-100.png" alt="" class="dropdown-arrow">
                    </button>
                    
                    <div class="role-dropdown rd-hidden">
                        <button class="student-role-btn">
                            <img src="assets\images\icons8-student-male-100.png" alt="">
                            <p>Student</p>
                        </button>
                        <button class="instructor-role-btn">
                            <img src="assets\images\icons8-training-100.png" alt="">
                            <p>Instructor</p>
                        </button>
                        <button class="admin-role-btn">
                            <img src="assets\images\icons8-admin-100.png" alt="">
                            <p>Admin</p>
                        </button>                        
                    </div>


                    <button id="profile-btn" class="rh-btn active-box-1">
                        <img src="assets\images\icons8-account-100.png" alt="profile" class="h-btn-icon">
                    </button>
                </div>

            </header>

            <div class="main-content">
                <div class="left sidebar shadow-box-1">
                    <button id="ls-collapse-btn" class="hover-box-2 active-box-1">
                        <img src="assets\images\icons8-collapse-arrow-100.png" alt="" class="ls-collapse-icon">
                    </button>
                    
                    <div class="student-sidebar-content sidebar-content">
                        <button class="ls-home ls-btn hover-box-2 active-box-1">
                            <img src="assets\svg\icons8-home.svg" alt="" class="ls-btn-icon">
                            <span class="ls-btn-text">Home</span>
                        </button>

                        <div class="ls-dropdown">
                            <button class="ls-courses ls-btn ls-dropdown hover-box-2 active-box-1">
                                <img src="assets\images\icons8-read-100.png" alt="" class="ls-btn-icon">
                                <span class="ls-btn-text">My Courses</span>
                            </button>
                            <button class="ls-btn-dropdown">
                                <img class="ls-btn-dropdown-arrow" src="assets\images\icons8-collapse-arrow-100.png" alt="">
                            </button>
                            <div class="dropdown"></div>
                        </div>

                        <button class="ls-explore ls-btn hover-box-2 active-box-1">
                            <img src="assets\svg\icons8-binoculars.svg" alt="" class="ls-btn-icon">
                            <span class="ls-btn-text">Explore Courses</span>
                        </button>

                        <button class="ls-institutions ls-btn hover-box-2 active-box-1">
                            <img src="assets\images\icons8-institution-100.png" alt="" class="ls-btn-icon">
                            <span class="ls-btn-text">Institutions</span>
                        </button>

                        <button class="ls-discussions ls-btn hover-box-2 active-box-1">
                            <img src="assets\images\icons8-discussion-100.png" alt="" class="ls-btn-icon">
                            <span class="ls-btn-text">Discussions</span>
                        </button>

                        <button class="ls-assignment ls-btn hover-box-2 active-box-1">
                            <img src="assets\images\icons8-assignment-100.png" alt="" class="ls-btn-icon">
                            <span class="ls-btn-text">Assignment</span>
                        </button>

                        <button class="ls-settings ls-btn hover-box-2 active-box-1">
                            <img src="assets\svg\icons8-settings.svg" alt="" class="ls-btn-icon">
                            <span class="ls-btn-text">Settings</span>
                        </button>
                    </div>

                    <div class="instructor-sidebar-content sidebar-content">
                        <button class="ls-institutions ls-btn hover-box-2 active-box-1">
                            <img src="assets\images\icons8-institution-100.png" alt="" class="ls-btn-icon">
                            <span class="ls-btn-text">Institution</span>
                        </button>
                        <button class="ls-courses ls-btn hover-box-2 active-box-1">
                            <img src="assets\images\icons8-read-100.png" alt="" class="ls-btn-icon">
                            <span class="ls-btn-text">My Courses</span>
                        </button>
                        <button class="ls-create-course ls-btn hover-box-2 active-box-1">
                            <img src="assets\images\icons8-read-plus-100.png" alt="" class="ls-btn-icon">
                            <span class="ls-btn-text">Create course</span>
                        </button>
                        <button class="ls-discussions ls-btn hover-box-2 active-box-1">
                            <img src="assets\images\icons8-discussion-100.png" alt="" class="ls-btn-icon">
                            <span class="ls-btn-text">Discussions</span>
                        </button>
                        <button class="ls-assignment ls-btn hover-box-2 active-box-1">
                            <img src="assets\images\icons8-assignment-100.png" alt="" class="ls-btn-icon">
                            <span class="ls-btn-text">Assignment</span>
                        </button>
                        <button class="ls-quizzes ls-btn hover-box-2 active-box-1">
                            <img src="assets\images\icons8-quiz-100.png" alt="" class="ls-btn-icon">
                            <span class="ls-btn-text">Quizzes</span>
                        </button>
                        <button class="ls-submissions ls-btn hover-box-2 active-box-1">
                            <img src="assets\images\icons8-submit-document-100.png" alt="" class="ls-btn-icon">
                            <span class="ls-btn-text">Student submissions</span>
                        </button>
                        <button class="ls-announcements ls-btn hover-box-2 active-box-1">
                            <img src="assets\images\icons8-announcement-100.png" alt="" class="ls-btn-icon">
                            <span class="ls-btn-text">Announcements</span>
                        </button>
                        <button class="lse ls-btn hover-box-2 active-box-1">
                            <img src="assets\images\icons8-message-100.png" alt="" class="ls-btn-icon">
                            <span class="ls-btn-text">Messages</span>
                        </button>
                        <button class="ls-settings ls-btn hover-box-2 active-box-1">
                            <img src="assets\svg\icons8-settings.svg" alt="" class="ls-btn-icon">
                            <span class="ls-btn-text">Settings</span>
                        </button>
                    </div>

                    <div class="admin-sidebar-content sidebar-content">

                        <div class="ls-dropdown">
                            <button class="ls-management ls-btn hover-box-2 active-box-1">
                                <img src="assets\images\icons8-adjust-100.png" alt="" class="ls-btn-icon">
                                <span class="ls-btn-text">Management</span>
                            </button>

                            <button class="ls-btn-dropdown">
                                <img class="ls-btn-dropdown-arrow" src="assets\images\icons8-collapse-arrow-100.png" alt="">
                            </button>

                            <div class="dropdown">
                                <button class="ls-dropdown-btn">
                                    <img src="assets\images\icons8-users-100.png" alt="" class="ls-dropdown-icon">
                                    <span class="ls-dropdown-text">Users</span>
                                </button>
                                <button class="ls-dropdown-btn">
                                    <img src="assets\images\icons8-roles-100 (1).png" alt="" class="ls-dropdown-icon">
                                    <span class="ls-dropdown-text">Roles</span>
                                </button>
                                <button class="ls-dropdown-btn">
                                    <img src="assets\images\icons8-read-100.png" alt="" class="ls-dropdown-icon">
                                    <span class="ls-dropdown-text">Courses</span>
                                </button>
                                <button class="ls-dropdown-btn">
                                    <img src="assets\images\icons8-institution-100.png" alt="" class="ls-dropdown-icon">
                                    <span class="ls-dropdown-text">Institutions</span>
                                </button>
                            </div>
                        </div>


                        <button class="ls-r&a ls-btn hover-box-2 active-box-1">
                            <img src="assets\images\icons8-web-analytics-100.png" alt="" class="ls-btn-icon">
                            <span class="ls-btn-text">Reports & Analytics</span>
                        </button>
                        <button class="lse ls-btn hover-box-2 active-box-1">
                            <img src="assets\images\icons8-message-100.png" alt="" class="ls-btn-icon">
                            <span class="ls-btn-text">Messages</span>
                        </button>
                        <button class="ls-announcements ls-btn hover-box-2 active-box-1">
                            <img src="assets\images\icons8-announcement-100.png" alt="" class="ls-btn-icon">
                            <span class="ls-btn-text">Announcements</span>
                        </button>
                        <button class="ls-admin-settings ls-btn hover-box-2 active-box-1">
                            <img src="assets\images\icons8-settings-100.png" alt="" class="ls-btn-icon">
                            <span class="ls-btn-text">System Settings</span>
                        </button>

                    </div>

                </div>

                <div class="index content shadow-box-1"></div>

                <div class="right sidebar chatbot shadow-box-1 collapsed">
                    <button id="rs-collapse-btn">
                        <img src="assets\images\learnova-ai-1.png" alt="" id="rs-collapse-icon">
                    </button>
                    <div class="input-box">
                        <div class="prompt-text-area">
                            <p contenteditable="true" id="prompt-p"></p>
                        </div>
                        <div class="features">
                            <div class="left-section">
                                <button class="prompt-attach-btn">Attach</button>
                                <button class="prompt-search-btn">Search</button>
                                <button class="prompt-context-btn">Context</button>
                            </div>
                            <div class="right-section">
                                <button class="prompt-send-btn">
                                    <img src="assets\images\icons8-send-letter-100.png" alt="">
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="login-content"></div>

            <footer class="main-footer shadow-box-1">

            </footer>
        </main>
    </body>
</html>
