<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="css/main.css">
    <script type="module" src="js/main.js"></script>
</head>

<body>

    <div class="app">

        <!-- HEADER -->
        <header class="app-header app-header--user">

            <!-- Left -->
            <div class="app-header__left">
                <button class="app-header__button app-header__button--sidebar-toggle app-header__button--sidebar-toggle-collapsed">
                    <img src="assets\icons\icons8-hamburger-menu-100.png" alt="" class="primary">
                    <img src="assets\icons\icons8-hamburger-menu-100.png" alt="" class="secondary">
                </button>

                <div class="app-header__logo">
                    <img src="assets\images\learnova-icon.png" alt="">
                    <img src="assets\images\learnova-text.png" alt="">
                </div>
            </div>

            <!-- Center -->
            <div class="app-header__center">
                <div class="app-header__title"></div>
            </div>

            <!-- Right -->
            <div class="app-header__right app-header__right--authenticated">

                <!-- Primary -->
                <button class="app-header__button app-header__button--calendar">
                    <img src="assets/icons/icons8-calendar-100.png" alt="">
                </button>
                <button class="app-header__button app-header__button--notifications">
                    <img src="assets/icons/icons8-notification-64.png" alt="">
                </button>
                <button class="app-header__button app-header__button--messages">
                    <img src="assets\icons\icons8-message-100.png" alt="">
                </button>
                <button class="app-header__button app-header__button--profile">
                    <img src="assets/icons/icons8-account-100.png" alt="">
                </button>

            </div>

            <!-- Secondary -->
            <div class="app-header__right app-header__right--public">
                <button class="app-header__button app-header__button--login">log in</button>
                <button class="app-header__button app-header__button--signup">sign up</button>
            </div>

            <!-- Temporary element -->
            <button class="app-header-toggle">
                Header toggle
            </button>

        </header>

        <!-- BODY -->
        <div class="app-body">

            <!-- Sidebar -->
             <aside class="sidebar sidebar--collapsed">
                <div class="sidebar__content">

                </div>
            </aside>

            <main class="app-content"></main>

        </div>

        <!-- FOOTER -->
        <footer class="app-footer"></footer>

        <!-- <div class="tooltip">tooltip</div> -->

    </div>

    <!-- <button class="chatbot-toggle" title="Open and close chatbot"></button>
    <div class="chatbot"></div> -->

</body>
